<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta name="view-transition" content="same-origin">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quartos — Hotel Bege Ouro</title>
  <meta name="description" content="Veja os quartos do Hotel Bege Ouro: Individual, Superior, Suíte Master e Família. Reserve online.">
  <meta property="og:title" content="Quartos — Hotel Bege Ouro">
  <meta property="og:description" content="Individual, Superior, Suíte Master e Família. Reserve online.">
  <meta property="og:image" content="https://hotelbegeouro.com.br/img/lobby-real.jpg">
  <meta property="og:url" content="https://hotel-bege-ouro.vercel.app/quartos.html">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=13">
  <style>
    .page-header {
      padding: 200px 0 110px;
      background: linear-gradient(rgba(26,19,13,0.78), rgba(60,40,25,0.7)),
                  url('img/quarto-casal.jpg') center/cover;
      color: var(--creme);
      text-align: center;
    }
    .page-header h1 { color: var(--creme); }
    .page-header h1 em { color: var(--dourado-claro); font-style: italic; }
    .page-header .section-eyebrow { color: var(--dourado-claro); }
    .page-header .section-eyebrow::before, .page-header .section-eyebrow::after { background: var(--dourado-claro); }
    .page-header p { color: rgba(250, 246, 238, 0.85); }

    .room-row { display: grid; grid-template-columns: 1.1fr 1fr; gap: 70px; align-items: center; margin-bottom: 100px; }
    .room-row:nth-child(even) .room-row-photo { order: 2; }
    .room-row-photo { aspect-ratio: 4/3; background-size: cover; background-position: center; box-shadow: var(--sombra-forte); position: relative; transition: background-image 0.3s; }
    .room-row-gallery { display: flex; flex-direction: column; gap: 6px; }
    .room-row-thumbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .room-row-thumb { aspect-ratio: 1/1; background-size: cover; background-position: center; cursor: pointer; border: 2px solid transparent; transition: border-color 0.25s, transform 0.25s; }
    .room-row-thumb:hover { transform: scale(1.04); }
    .room-row-thumb.active { border-color: var(--dourado, #c9a961); }
    .room-row-photo .badge {
      position: absolute; top: 20px; left: 20px;
      background: rgba(26,19,13,0.85); color: var(--dourado-claro);
      padding: 8px 18px; font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 600;
    }
    .room-row h2 { font-size: 2.2rem; }
    .room-row .meta-line { display:flex; gap: 26px; color: var(--cinza-texto); font-size: 0.95rem; margin: 16px 0 24px; flex-wrap: wrap; }
    .room-row .meta-line span { display:inline-flex; align-items:center; gap:6px; }
    .room-row .amen-list { display:flex; flex-wrap:wrap; gap:8px; margin: 24px 0 30px; }
    .room-row .price-line { display:flex; align-items:baseline; justify-content:space-between; padding-top: 26px; border-top: 1px solid var(--cinza-borda); }
    .room-row .price-line .price { font-size: 2.2rem; }

    @media(max-width: 880px){
      .room-row { grid-template-columns: 1fr; gap: 30px; margin-bottom: 60px; }
      .room-row:nth-child(even) .room-row-photo { order: 0; }
      .page-header { padding: 150px 0 80px; }
    }
  </style>
</head>
<body>

<header class="page-header">
  <div class="container">
    <span class="section-eyebrow">Acomodações</span>
    <h1 style="margin-top:18px;">Quartos para cada <em>tipo de viagem</em>.</h1>
    <p style="max-width:640px; margin: 22px auto 0; font-size: 1.1rem;">Categorias diferentes com o mesmo padrão de elegância. Todos com enxoval premium, ar-condicionado e Wi-Fi de alta velocidade.</p>
  </div>
</header>

<section class="section">
  <div class="container" id="roomsList"></div>
</section>

<section class="cta-banner">
  <div class="container">
    <h2>Reserve seu <em>quarto preferido</em></h2>
    <p>Verifique a disponibilidade em tempo real para a data desejada.</p>
    <a href="reservar.html" class="btn btn-primary">Verificar disponibilidade →</a>
  </div>
</section>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/db.js"></script>
<script src="js/site.js?v=18"></script>
<script>
(async function() {
  await DB.load();
  SITE.init('quartos');

  const categorias = [
    {
      tipo: 'Solteiro',
      camas: '1 cama de solteiro individual',
      preco: 150,
      descricao: 'Ideal para viajantes individuais. Oferece conforto, privacidade e praticidade com enxoval premium, ar-condicionado, TV de tela plana e Wi-Fi de alta velocidade.',
      amenities: ['Wi-Fi', 'Ar condicionado', 'TV', 'Enxoval premium', 'Mesa de trabalho'],
      img: IMG.quartoSolteiro,
      imgs: [IMG.quartoSolteiro, IMG.quartoSolteiroBanho, IMG.quartoSolteiroPia, IMG.tvArCondicionado],
      capacidade: 1
    },
    {
      tipo: 'Casal',
      camas: '1 cama de casal (ocupação individual)',
      preco: 190,
      descricao: 'Excelente opção para viajantes individuais que preferem mais espaço e o conforto de uma cama de casal. Decoração clássica, ambiente climatizado, TV de tela plana e frigobar.',
      amenities: ['Wi-Fi', 'Ar condicionado', 'TV', 'Enxoval premium', 'Frigobar'],
      img: IMG.quartoCasal,
      imgs: [IMG.quartoCasal, IMG.quartoCasal2, IMG.quartoCasal3, IMG.quartoCasalBanho, IMG.quartoCasalFrigobar],
      capacidade: 1
    },
    {
      tipo: 'Casal',
      camas: '1 cama de casal (ocupação dupla)',
      preco: 270,
      descricao: 'Ideal para casais. Cama de casal confortável, decoração clássica, ambiente climatizado, TV de tela plana e frigobar para uma estadia completa a dois.',
      amenities: ['Wi-Fi', 'Ar condicionado', 'TV', 'Enxoval premium', 'Frigobar'],
      img: IMG.quartoCasal,
      imgs: [IMG.quartoCasal, IMG.quartoCasal2, IMG.quartoCasal3, IMG.quartoCasalBanho, IMG.quartoCasalFrigobar],
      capacidade: 2
    },
    {
      tipo: 'Duplo Solteiro',
      camas: '2 camas de solteiro individuais',
      preco: 270,
      descricao: 'Espaço excelente para duas pessoas em camas individuais de solteiro. Ambiente climatizado, confortável e prático com TV e frigobar.',
      amenities: ['Wi-Fi', 'Ar condicionado', 'TV', 'Enxoval premium', 'Frigobar'],
      img: IMG.quartoDuplo,
      imgs: [IMG.quartoDuplo, IMG.quartoDuploBanho, IMG.piaVaso, IMG.tvArCondicionado],
      capacidade: 2
    },
    {
      tipo: 'Triplo / Família',
      camas: '1 cama de casal + 1 cama de solteiro',
      preco: 310,
      descricao: 'Perfeito para pequenas famílias ou grupos de três pessoas. Amplo, confortável e com total comodidade. Inclui enxoval premium, ar-condicionado, TV e frigobar.',
      amenities: ['Wi-Fi', 'Ar condicionado', 'TV', 'Frigobar', 'Enxoval premium', 'Espaço amplo'],
      img: IMG.quartoTriploReal,
      imgs: [IMG.quartoTriploReal, IMG.quartoTriploBanho, IMG.piaVaso, IMG.frigobarGenerico],
      capacidade: 3
    }
  ];

  document.getElementById('roomsList').innerHTML = categorias.map((c, idx) => `
    <div class="room-row">
      <div class="room-row-gallery">
        <div class="room-row-photo" id="qMain-${idx}" style="background-image: url('${c.img}');">
          <span class="badge">Premium</span>
        </div>
        <div class="room-row-thumbs">
          ${c.imgs.map((u, i) => `
            <div class="room-row-thumb${i === 0 ? ' active' : ''}"
                 style="background-image: url('${u}');"
                 onclick="document.getElementById('qMain-${idx}').style.backgroundImage='url(${u})'; this.parentElement.querySelectorAll('.room-row-thumb').forEach(t=>t.classList.remove('active')); this.classList.add('active');"
                 role="img" aria-label="Foto ${i + 1} do quarto ${c.tipo}"></div>
          `).join('')}
        </div>
      </div>
      <div>
        <span class="section-eyebrow" style="padding: 0; display: inline-block;">${c.tipo}</span>
        <h2 style="margin-top:14px;">Quarto ${c.tipo}</h2>
        <div class="meta-line">
          <span>👤 Até ${c.capacidade} ${c.capacidade === 1 ? 'pessoa' : 'pessoas'}</span>
          <span>★ Premium</span>
          <span>✦ Conforto Garantido</span>
        </div>
        <p style="color: var(--cinza-texto); line-height: 1.8;">${c.descricao}</p>
        <p style="font-size:0.9rem; color:var(--marrom); margin-top:8px;"><strong>Configuração:</strong> ${c.camas}</p>
        <div class="amen-list">
          ${c.amenities.map(a => `<span class="amenity">${a}</span>`).join('')}
        </div>
        <div class="price-line">
          <div class="price"><small>a partir de</small> ${DB.formatBRL(c.preco)} <small>/ diária</small></div>
          <a href="reservar.html?tipo=${encodeURIComponent(c.tipo)}" class="btn btn-dark btn-sm">Reservar este quarto</a>
        </div>
      </div>
    </div>`).join('');
})();
</script>
</body>
</html>
