<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso restrito — Hotel Bege Ouro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="login-shell">
  <div class="login-card">
    <a href="../index.html" class="logo">
      <span class="mark">B</span>Bege<span> Ouro</span>
    </a>
    <p class="sub">Acesso à dashboard</p>

    <div class="err" id="errBox"></div>

    <form id="loginForm">
      <label class="field">E-mail</label>
      <input type="email" id="email" required>

      <label class="field">Senha</label>
      <input type="password" id="senha" required>

      <button type="submit">Entrar</button>
    </form>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js?v=2"></script>
<script src="../js/db.js?v=2"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'Entrando...';
    btn.disabled = true;
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const user = await DB.login(email, senha);
    const err = document.getElementById('errBox');
    if (!user) {
      err.textContent = 'E-mail ou senha incorretos.';
      err.style.display = 'block';
      btn.textContent = 'Entrar';
      btn.disabled = false;
      return;
    }
    location.href = 'dashboard.html';
  });
</script>
</body>
</html>
