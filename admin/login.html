<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso restrito — Hotel Bege Ouro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="login-shell">
  <div class="login-card">
    <a href="../index.html" class="logo">
      <span class="mark">B</span>Bege<span> Ouro</span>
    </a>
    <p class="sub">Acesso à dashboard</p>

    <div class="err" id="errBox"></div>

    <form id="loginForm">
      <label class="field">E-mail</label>
      <input type="email" id="email" required value="admin@begeouro.com">

      <label class="field">Senha</label>
      <input type="password" id="senha" required value="admin123">

      <button type="submit">Entrar</button>
    </form>

    <div class="login-hint">
      <strong>Credenciais de teste</strong>
      Admin: <code>admin@begeouro.com</code> / <code>admin123</code><br>
      Funcionário: <code>maria@begeouro.com</code> / <code>maria123</code><br>
      Financeiro: <code>joao@begeouro.com</code> / <code>joao123</code>
    </div>
  </div>
</div>

<script src="../js/db.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const user = DB.login(email, senha);
    const err = document.getElementById('errBox');
    if (!user) {
      err.textContent = 'E-mail ou senha incorretos.';
      err.style.display = 'block';
      return;
    }
    location.href = 'dashboard.html';
  });
</script>
</body>
</html>
